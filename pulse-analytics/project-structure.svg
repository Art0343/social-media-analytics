  <text x="1020" y="725" fill="#eaeaea" font-size="12" font-family="Inter, sans-serif">2. Pass props to <tspan font-weight="bold">Client Components</tspan></text>
  <text x="1020" y="750" fill="#eaeaea" font-size="12" font-family="Inter, sans-serif">3. Client handles interactivity</text>
  <text x="1020" y="775" fill="#eaeaea" font-size="12" font-family="Inter, sans-serif">4. <tspan font-weight="bold">Barrel exports</tspan> for clean imports</text>
  <text x="1020" y="800" fill="#eaeaea" font-size="12" font-family="Inter, sans-serif">5. <tspan font-weight="bold">Loading.tsx</tspan> in every route</text>
